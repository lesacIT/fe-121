<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Báo cáo khám bệnh</title>

<style>
@page {
  size: A4 landscape;
  margin: 10mm;
}

body {
  font-family: Arial, sans-serif;
  font-size: 12px;
}

/* ===== GIỮ KHUNG SECTION ===== */
.section {
  margin-bottom: 20px;
}

.section-title {
  font-weight: bold;
  margin-bottom: 6px;
}

/* ===== TABLE EXCEL ===== */
.report-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}

.report-table th,
.report-table td {
  border: 1px solid #000;
  padding: 3px;
}

.report-table th {
  text-align: center;
  font-weight: 600;
}

.report-table td {
  text-align: center;
}

.report-table .left {
  text-align: left;
}

.report-table .num {
  text-align: right;
  padding-right: 6px;
}

.report-table .group-row {
  background: #f2f2f2;
  font-weight: 600;
}

.report-table .total-row {
  color: red;
  font-weight: 700;
}

.report-table .doctor {
  white-space: pre-line;
}

.header {
  text-align: center;
  margin-bottom: 10px;
}

.header .title {
  font-size: 16px;
  font-weight: bold;
}

@media print {
  button { display: none; }
}
.report-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}

.report-table th,
.report-table td {
  border: 1px solid #000;
  padding: 3px;
}

.report-table th {
  text-align: center;
  font-weight: 600;
}

.report-table td {
  text-align: center;
}

.report-table .left {
  text-align: left;
}

.report-table .num {
  text-align: right;
  padding-right: 6px;
}

.report-table .group-row {
  background: #f2f2f2;
  font-weight: 600;
}

.report-table .total-row {
  color: red;
  font-weight: 700;
}

.report-table .doctor {
  white-space: pre-line;
}
</style>
</head>

<body>

<button onclick="window.print()">🖨️ In</button>

<!-- HEADER (GIỮ GIỐNG CŨ) -->
<div class="header">
  <div>CỤC HẬU CẦN - KỸ THUẬT QK9</div>
  <div><strong>BỆNH VIỆN QUÂN Y 121</strong></div>
  <div class="title">BÁO CÁO KHÁM GIỜ HÀNH CHÍNH</div>
  <div id="time"></div>
</div>

<!-- SECTION -->
<div class="section">
  <div class="section-title">1. Khám bệnh</div>

  <!-- TABLE MỚI -->
  <table class="report-table">
    <thead>
      <tr>
        <th rowspan="2">TT</th>
        <th colspan="4">Phòng Khám</th>
        <th colspan="5">Số lượng khám</th>
        <th rowspan="2">Tái khám</th>
        <th rowspan="2">Nhập viện</th>
        <th rowspan="2">Tỷ lệ</th>
      </tr>
      <tr>
        <th>Số PK</th>
        <th>Chuyên ngành</th>
        <th>Khoa</th>
        <th>Bác sĩ</th>
        <th>Tổng</th>
        <th>QN</th>
        <th>BHA</th>
        <th>BHYT</th>
        <th>DVYT</th>
      </tr>
    </thead>

    <tbody id="tb-kham-body"></tbody>
  </table>
</div>
<script>

  const body = document.getElementById("tb-kham-body");
let index = 1;

/* ===== TOTAL ===== */
const totalRow = document.createElement("tr");
totalRow.className = "total-row";
totalRow.innerHTML = `
  <td colspan="5">Tổng</td>
  <td class="num">219</td>
  <td>1</td>
  <td>33</td>
  <td>58</td>
  <td>127</td>
  <td>87</td>
  <td>11</td>
  <td>5.0%</td>
`;
body.appendChild(totalRow);

/* ===== GROUP + ITEM ===== */
D.khamBenh.forEach(group => {

  // group
  const trGroup = document.createElement("tr");
  trGroup.className = "group-row";
  trGroup.innerHTML = `
    <td colspan="5">${group.TenNhom}</td>
    <td colspan="8"></td>
  `;
  body.appendChild(trGroup);

  // items
  group.Items.forEach(item => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${index++}</td>
      <td>${item.MaPhong || ""}</td>
      <td class="left">${item.TenPhong || ""}</td>
      <td>${item.Khoa || ""}</td>
      <td class="doctor">${(item.BacSi || "").replaceAll("\n","<br>")}</td>

      <td class="num">${item.Tong || 0}</td>
      <td>${item.QN || 0}</td>
      <td>${item.BHA || 0}</td>
      <td>${item.BHYT || 0}</td>
      <td>${item.DVYT || 0}</td>

      <td>${item.TaiKham || ""}</td>
      <td>${item.NhapVien || ""}</td>
      <td>${item.TyLe || ""}</td>
    `;

    body.appendChild(tr);
  });

});
</script>



</body>
</html>
